<!DOCTYPE html>
<html lang="en">
<head>
    <title>Shopping Cart - MariaHouse</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="style/cart.css">
</head>

<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="brand-header">

        <img src="images/MH logo.png" alt="MariaHouse Logo" class="logo-image">

        <div class="logo">Maria<span>House</span></div>

        <nav class="navbar">

            <a href="cart.html" class="cart-btn">
                🛒 Cart <span id="cart-count">0</span>
            </a>

            <div class="dropdown">
                <button class="menu-btn">☰ Menu</button>

                <div class="dropdown-content">
                    <a href="index.html">Home</a>
                    <a href="activities.html">Activities</a>
                    <a href="notifications.html">Notifications</a>
                    <a href="contact.html">Contact MariaHouse</a>
                </div>
            </div>

        </nav>

    </header>

    <!-- CART CONTAINER -->
    <div class="cart-container">

        <div class="cart-card">

            <h2>Your Shopping Cart</h2>

            <!-- TABLE -->
            <table class="cart-table">

                <thead>
                    <tr>
                        <th>Item</th>
                        <th>Price</th>
                        <th>Qty</th>
                        <th>Subtotal</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody id="cart-items">
                    <tr>
                        <td colspan="5">No products selected</td>
                    </tr>
                </tbody>

            </table>

            <!-- SUMMARY -->
            <div class="cart-summary">

                <p><strong>Items:</strong> <span id="items-count">0</span></p>

                <p><strong>Discount:</strong> $<span id="discount">0.00</span></p>

                <p><strong>Total:</strong> $<span id="total">0.00</span></p>

            </div>

            <!-- FIXED BUTTON -->
            <button class="pay-btn" onclick="goToCheckout()">
                Proceed to Payment
            </button>

        </div>

    </div>

</div>

<!-- SCRIPT -->
<script src="script/script.js"></script>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        loadCartPage();
    });

    // ✅ FIXED FUNCTION (THIS WAS MISSING BEFORE)
    function goToCheckout() {

        let cart = JSON.parse(localStorage.getItem("mariahouse_cart")) || [];

        if (cart.length === 0) {
            alert("Your cart is empty!");
            return;
        }

        window.location.href = "checkout.html";
    }
</script>

</body>
</html>
