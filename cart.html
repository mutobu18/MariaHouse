<!DOCTYPE html>
<html lang="en">
<head>
    <title>Shopping Cart - MariaHouse</title>
    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="style/cart.css">
</head>

<body>


     <div class="app-container">
         
    <!-- HEADER -->
    <header class="brand-header">

    <img src="images/IMG_E2786.JPG" alt="MariaHouse Logo" class="logo-image">

    <div class="logo">Maria<span>House</span></div>

    <nav class="navbar">


       <a href="cart.html" class="cart-btn">
    🛒 Cart <span id="cart-count">0</span>
</a>

        <div class="dropdown">
            <button class="menu-btn">☰ Menu</button>

            <div class="dropdown-content">
                 <a href="index.html">Home</a>
                <a href="activities.html">Activities</a>
                <a href="notifications.html">Notifications</a>
                <a href="contact.html">Contact MariaHouse</a>
            </div>
        </div>

       
    </nav>

</header>


    

<div class="cart-container">

    <div class="cart-card">

        <h2>Your Shopping Cart</h2>

        <table class="cart-table">

            <thead>
                <tr>
                    <th>Item</th>
                    <th>Price</th>
                    <th>Qty</th>
                    <th>Subtotal</th>
                </tr>
            </thead>

            <tbody id="cart-items">
                <tr><td colspan="4">No products selected</td></tr>
            </tbody>

        </table>

        <div class="cart-summary">

            <p><strong>Items:</strong> <span id="items-count">0</span></p>

            <p><strong>Discount:</strong> $<span id="discount">0.00</span></p>

            <p><strong>Total:</strong> $<span id="total">0.00</span></p>

        </div>

        <button class="pay-btn" onclick="pay()">
            Proceed to Payment
        </button>

    </div>

</div>
<script src="script/script.js"></script>

<script>
    let cart = JSON.parse(localStorage.getItem("mariahouse_cart")) || [];

    function loadCartPage() {

        let cartItems = document.getElementById("cart-items");
        let totalElement = document.getElementById("total");
        let cartCount = document.getElementById("cart-count");

        cartItems.innerHTML = "";

        let total = 0;
        let totalItems = 0;

        if (cart.length === 0) {
            cartItems.innerHTML = "<p>No products selected</p>";
            totalElement.textContent = "$0.00";
            cartCount.textContent = 0;
            return;
        }

        cart.forEach(item => {

            let subtotal = item.price * item.quantity;

            total += subtotal;
            totalItems += item.quantity;

            cartItems.innerHTML += `
                <div class="cart-item">
                    <h4>${item.name}</h4>
                    <p>$${item.price.toFixed(2)} x ${item.quantity}</p>
                    <p>Subtotal: $${subtotal.toFixed(2)}</p>
                </div>
            `;
        });

        totalElement.textContent = "$" + total.toFixed(2);
        cartCount.textContent = totalItems;
    }

   document.addEventListener("DOMContentLoaded", function () {
    loadCartPage();
});
</script>

</body>
</html>
