<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout - MariaHouse</title>

    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="style/checkout.css">
    
</head>

<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="brand-header">
        <img src="images/MH logo.png" alt="MariaHouse Logo" class="logo-image">

        <div class="logo">Maria<span>House</span></div>

        <nav class="navbar">
            <div class="dropdown">
                <button class="menu-btn">☰ Menu</button>

                <div class="dropdown-content">
                    <a href="index.html">Home</a>
                    <a href="activities.html">Activities</a>
                    <a href="notifications.html">Notifications</a>
                    <a href="contact.html">Contact MariaHouse</a>
                </div>
            </div>
        </nav>
    </header>

    <!-- CENTERED CARD -->
    <div class="checkout-card">

        <h2>Checkout Page</h2>

        <!-- ORDER SUMMARY -->
         <div class="customer-form">

    <input type="text" id="customer-name" placeholder="Enter your full name">

    <input type="text" id="customer-city" placeholder="Enter your town / city">

</div>
        <div id="order-summary">
            <p>No products selected</p>
        </div>

        <!-- TOTAL -->
        <h3 id="total">Total: $0.00</h3>

        <!-- BUTTON -->
        <button onclick="goToPayment()">
            Proceed to Payment Details
        </button>

    </div>

</div>

<!-- ✅ FIXED PATH (VERY IMPORTANT) -->
<script src="script/checkout.js"></script>

</body>
</html>
