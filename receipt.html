<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Receipt - MariaHouse</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="style/receipt.css">
</head>

<body>

<div class="app-container">

    <div class="receipt-card">

        <h2>🧾 MariaHouse Receipt</h2>

        <!-- CUSTOMER INFO -->
        <p id="customer-name"></p>
        <p id="customer-city"></p>

        <!-- DATE -->
        <p id="date"></p>

        <!-- ITEMS -->
        <div id="receipt-items"></div>

        <!-- TOTAL -->
        <h3 id="total"></h3>

        <!-- BUTTONS -->
        <button onclick="sendWhatsApp()">
            Send to WhatsApp
        </button>

        <button onclick="clearCart()">
            Finish Order
        </button>

    </div>

</div>

<script>
// =========================
// LOAD RECEIPT
// =========================
function loadReceipt() {

    let data = JSON.parse(localStorage.getItem("mariahouse_receipt"));

    if (!data) {
        document.body.innerHTML = "<h2>No receipt found</h2>";
        return;
    }

    let name = localStorage.getItem("customer_name");
    let city = localStorage.getItem("customer_city");

    document.getElementById("customer-name").innerText = "Name: " + name;
    document.getElementById("customer-city").innerText = "City: " + city;

    document.getElementById("date").innerText = "Date: " + data.date;
    document.getElementById("receipt-items").innerHTML = data.items;
    document.getElementById("total").innerText = "TOTAL: $" + data.total;
}
// =========================
// SEND TO WHATSAPP
// =========================
function sendWhatsApp() {

    let data = JSON.parse(localStorage.getItem("mariahouse_receipt"));

    let name = localStorage.getItem("customer_name");
    let city = localStorage.getItem("customer_city");

    let text =
`🧾 MARIAHOUSE RECEIPT

👤 Name: ${name}
🏙 City: ${city}
📅 Date: ${data.date}

${data.items.replace(/<p>/g, "").replace(/<\/p>/g, "\n")}

💰 TOTAL: $${data.total}

Thank you for shopping with MariaHouse ❤️`;

    let phone = "254799457771";

    let url = `https://wa.me/${phone}?text=${encodeURIComponent(text)}`;

    window.open(url, "_blank");
}

// =========================
// INIT
// =========================
document.addEventListener("DOMContentLoaded", loadReceipt);
</script>

</body>
</html>
